<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>knitkit demo — React host + Vue remote</title>
  </head>
  <body>
    <div id="root">loading…</div>
    <!--
      Bootstrap pattern: a single <script type="module"> at the top of the page
      whose only job is to await registerRemotes() — which injects the import
      map — before any other module is imported. After that, dynamic import()
      of the rest of the app is safe.

      ZERO bundler plugins. The import map below is a static bootstrap; the
      real import map (with the negotiated shared deps) is injected by
      registerRemotes() at runtime, on top of this one.
    -->
    <script type="importmap">
      {
        "imports": {
          "@knitkit/runtime": "/runtime/index.js",
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "vue": "https://esm.sh/vue@3.4.21",
          "shared-state": "/shared/shared-state.js"
        }
      }
    </script>
    <script type="module">
      import { registerRemotes } from "@knitkit/runtime";
      await registerRemotes([
        { name: "checkout", manifest: "/federation/knit.manifest.json" },
      ], {
        hostShared: {
          react: {
            version: "18.3.1",
            requiredVersion: "^18.0.0",
            singleton: true,
            url: "https://esm.sh/react@18.3.1",
          },
        },
      });
      await import("/src/main.js");
    </script>
  </body>
</html>
